  # #     - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  # #   command: tunnel run
  # #   networks:
  # #     - intelliroom-network



networks:
  intelliroom-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local
  backend-uploads:
    driver: local
  nginx-cache:
    driver: local
