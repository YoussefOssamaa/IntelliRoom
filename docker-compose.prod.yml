name: intelliroom-prod
services:

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro ### normal path to import config
      - nginx-cache:/var/cache/nginx ### docker volume instead of path to reduce overhead 
      # - ./certs:/etc/letsencrypt:ro ### normal path to import cert
      # - ./certbot-var:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - intelliroom-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        

  orchestrator:
    build:
      context: ./ai/VDB-RecommEngine
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - KAGGLE_BASE_URL=${KAGGLE_BASE_URL}
    networks:
      - intelliroom-network 
    deploy: 
      resources: 
        limits: 
          cpus: "0.5" 
          memory: 512M 
        reservations: 
          cpus: "0.25" 
          memory: 256M 
    logging: 
      driver: "json-file" 
      options: 
        max-size: "10m" 
        max-file: "3" 
    depends_on:
      mongo:
        condition: service_healthy



  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.prod
    restart: unless-stopped
    networks:
      - intelliroom-network
    expose:
      - "80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile.prod
    restart: unless-stopped
    networks:
      - intelliroom-network
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      - API_PORT=5000
      - LOG_LEVEL=warn
      - COMFYUI_HOST=${COMFYUI_HOST}
      - KEYS_PATH=${KEYS_PATH}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - backend-uploads:/app/uploads #### docker volume not a normal local path
      - ./ai:/app/ai:ro
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongo:
    image: mongo:7
    container_name: intelliroom-mongo-prod
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    networks:
      - intelliroom-network
    volumes:
      #### docker volumes not normal local paths 
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
  # # certbot:
  # #   image: certbot/certbot
  # #   volumes:
  # #     - ./certs:/etc/letsencrypt
  # #     - ./certbot-var:/var/www/certbot
  # #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"



  # # cloudflared:
