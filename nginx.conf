### ============================================================
###  nginx.conf  —  IntelliRoom LOCAL DEVELOPMENT
###
###  Mirrors nginx.prod.conf as closely as possible.
###  Key differences from prod:
###    - No SSL / no HTTP→HTTPS redirect  (no certs in dev)
###    - No `frontend` or `backend` upstreams; both services
###      live inside the single `dev` container:
###        frontend (React Vite dev server) → dev:3000
###        backend  (Express API)           → dev:5000
###    - Rate limiting kept active so behaviour matches prod,
###      but thresholds are relaxed (won't affect you during dev).
###    - Caching headers on static assets are suppressed so hot
###      reload always delivers fresh files.
###    - `error_log` level bumped to `info` for easier debugging.
### ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log  info;   ### prod uses "warn"; "info" helps while developing
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;               ### same as prod
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    ### ── Logging ──────────────────────────────────────────────
    ### Identical format to prod so log lines look the same.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    ### ── Performance ─────────────────────────────────────────
    ### Identical to prod.
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size  2048;
    client_max_body_size  50M;             ### same as prod (file uploads)

    ### ── Gzip Compression ────────────────────────────────────
    ###Compresses responses (CSS, JS, JSON, SVG, etc.) to make the dev experience faster. Same settings as prod.
    gzip             on;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/rss+xml application/atom+xml image/svg+xml;

    ### ── Rate limiting ───────────────────────────────────────
    ### Same zones as prod; limits are high enough not to block
    ### normal dev work but still exercise the same code path.
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m      rate=10r/s;
    limit_req_zone  $binary_remote_addr  zone=general_limit:10m  rate=50r/s;

    ### ── Upstreams ───────────────────────────────────────────
    ### PROD has two upstreams (frontend:80, backend:5000).
    ### DEV has one container (`dev`) that exposes both ports.

    upstream backend {
        server  dev:5000;                  ### Express API inside the dev container
        keepalive  32;                     ### same as prod
    }

    upstream frontend {
        server  dev:3000;                  ### Vite / CRA dev server inside the dev container
        keepalive  32;                     ### same as prod
    }

    ### ── HTTP Server (no HTTPS redirect in dev) ──────────────
    ### PROD has two server blocks: one that redirects 80→443
    ### and one HTTPS block on 443.  In dev we collapse them
    ### into a single HTTP block on port 80, keeping all the
    ### same location blocks so the routing logic is identical.
    server {
        listen  80;
        server_name  localhost;            ### prod uses the real domain name

        ### ── Security Headers ──────────────────────────────
        ### Kept identical to prod so CSP / CORS issues surface
        ### in dev before they surprise you in production.
        ### HSTS is intentionally omitted (no HTTPS in dev).
        add_header  X-Frame-Options        "SAMEORIGIN"                    always;
        add_header  X-Content-Type-Options "nosniff"                       always;
        add_header  X-XSS-Protection       "1; mode=block"                 always;
        add_header  Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header  Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: http: https: blob:; connect-src 'self' ws: wss: http://${process.env.VITE_API_URL_BACKEND_BASE};"
            always;

        ### ── Health check ──────────────────────────────────
        ### Identical to prod — `docker-compose.yml` healthcheck
        ### pings this endpoint.
        location /health {
            access_log  off;
            return  200  "healthy\n";
            add_header  Content-Type  text/plain;
        }

        ### ── API Routes → backend (Express :5000) ──────────
        ### Identical proxy settings to prod.
        ### The strip of "/api/" prefix is done the same way:
        ### `proxy_pass http://backend/;` rewrites /api/foo → /foo
        location /api/ {
            # limit_req  zone=api_limit  burst=20  nodelay;  ### DISABLED IN DEV

            proxy_pass              http://backend;
            proxy_http_version      1.1;
            proxy_set_header  Upgrade            $http_upgrade;
            proxy_set_header  Connection         'upgrade';
            proxy_set_header  Host               $host;
            proxy_set_header  X-Real-IP          $remote_addr;
            proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto  $scheme;
            proxy_cache_bypass  $http_upgrade;
            proxy_connect_timeout  60s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }

        ### ── Static Assets → frontend dev server ───────────
        ### In PROD these are served from the built Nginx static
        ### container with long-lived cache headers.
        ### In DEV we proxy them through to the Vite dev server
        ### and disable caching so hot-reload always works.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mtl|obj|jsx|tsx)$ {
            # limit_req  zone=general_limit  burst=50  nodelay; ### DISABLED IN DEV
            
            proxy_pass          http://frontend;
            proxy_http_version  1.1;
            proxy_set_header    Host  $host;

            ### Override prod's "1y / immutable" cache to prevent
            ### stale assets during development.
            expires             off;
            add_header          Cache-Control  "no-store, no-cache, must-revalidate"  always;
            ### access_log kept on (prod turns it off) — useful during dev
        }

        ### ── Frontend SPA / Vite HMR → frontend dev server ─
        ### Identical proxy headers to prod.
        ### The Upgrade/Connection headers are critical here:
        ### Vite uses a WebSocket for Hot Module Replacement.
        location / {
            # limit_req  zone=general_limit  burst=50  nodelay; ### DISABLED IN DEV

            proxy_pass              http://frontend;
            proxy_http_version      1.1;
            proxy_set_header  Upgrade            $http_upgrade;
            proxy_set_header  Connection         'upgrade';   ### required for Vite HMR WS
            proxy_set_header  Host               $host;
            proxy_set_header  X-Real-IP          $remote_addr;
            proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto  $scheme;
            proxy_cache_bypass  $http_upgrade;
        }
    }
}
