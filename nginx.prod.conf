### ============================================================
###  nginx.prod.conf  —  IntelliRoom PRODUCTION
###
###  Roles:
###    - SSL/TLS termination (certs mounted via docker-compose)
###    - Reverse proxy to the backend  (Express :5000)
###    - Reverse proxy to the frontend (Nginx static :80)
###    - Security headers, rate limiting, gzip compression
### ============================================================

# Nginx runs as 'nginx' user (non-root for security)
user  nginx;

# Auto-detect number of CPU cores for worker processes (1 per core)
worker_processes  auto;

# Error log location and level (warn = warnings, errors, and critical)
error_log  /var/log/nginx/error.log  warn;

# PID file location (used by system to track the nginx process)
pid        /var/run/nginx.pid;

# ------------------------------------------------------------------------------
# EVENTS CONTEXT: How nginx handles connections at the OS level
# ------------------------------------------------------------------------------
events {
    # Max simultaneous connections per worker process
    # Total max connections = worker_processes * worker_connections
    worker_connections  1024;
}

# ------------------------------------------------------------------------------
# HTTP CONTEXT: Global HTTP settings shared across all server blocks
# ------------------------------------------------------------------------------
http {
    # Include MIME type mappings (file extension → Content-Type header)
    include       /etc/nginx/mime.types;
    
    # Default MIME type if not matched in mime.types
    default_type  application/octet-stream;

    ### ── Logging ──────────────────────────────────────────────
    
    # Define a custom log format named 'main' with rich debugging info:
    #   $remote_addr          = Client IP address
    #   $remote_user          = Authenticated user (if any)
    #   $time_local           = Local timestamp
    #   $request              = Full HTTP request line (method, URI, protocol)
    #   $status               = HTTP response status code
    #   $body_bytes_sent      = Bytes sent in response body
    #   $http_referer         = Referrer URL (where request came from)
    #   $http_user_agent      = Browser/client identifier
    #   $http_x_forwarded_for = Original client IP (when behind proxies)
    #   $request_time         = Total request processing time
    #   $upstream_connect_time = Time to connect to backend
    #   $upstream_header_time  = Time to receive headers from backend
    #   $upstream_response_time = Time for backend to generate full response
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    # Enable access logging using the 'main' format defined above
    access_log  /var/log/nginx/access.log  main;

    ### ── Performance ─────────────────────────────────────────
    
    # Use sendfile() syscall for efficient static file serving
    # Bypasses user-space buffer, sends directly from kernel to socket
    sendfile        on;
    
    # Don't send partial packets (wait until packet is full before sending)
    # Reduces network overhead for small files
    tcp_nopush      on;
    
    # Disable Nagle's algorithm (send small packets immediately)
    # Good for interactive/real-time applications
    tcp_nodelay     on;
    
    # Keep connections open for 65 seconds after request completes
    # Allows reuse for subsequent requests (HTTP keep-alive)
    keepalive_timeout  65;
    
    # Max size of hash tables for MIME types and other lookups
    # Larger = faster lookups but more memory
    types_hash_max_size  2048;
    
    # Max upload body size (prevents huge uploads crashing the server)
    # 50M = 50 megabytes
    client_max_body_size  50M;

    ### ── Gzip Compression ────────────────────────────────────
    
    # Enable gzip compression to reduce bandwidth
    gzip             on;
    
    # Add "Vary: Accept-Encoding" header (helps caches serve correct version)
    gzip_vary        on;
    
    # Compress responses for proxied requests too
    gzip_proxied     any;
    
    # Compression level (1=fast/large, 9=slow/small, 6=good balance)
    gzip_comp_level  6;
    
    # MIME types to compress (text-based content benefits most)
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/rss+xml application/atom+xml image/svg+xml;

    ### ── Rate Limiting ───────────────────────────────────────
    
    # Define a rate limit zone named 'api_limit':
    #   $binary_remote_addr = Key by client IP (binary = memory efficient)
    #   zone=api_limit:10m  = Store state in 10MB shared memory zone
    #   rate=10r/s          = Allow 10 requests per second per IP
    # Used for API endpoints to prevent abuse
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m      rate=10r/s;
    
    # Define a rate limit zone named 'general_limit':
    #   rate=50r/s = More lenient limit for general web traffic
    limit_req_zone  $binary_remote_addr  zone=general_limit:10m  rate=50r/s;

    ### ── Upstreams ───────────────────────────────────────────
    ### Upstreams define backend server pools for load balancing/proxying
    
    # 'backend' upstream: Express.js API server running in Docker container
    # Docker Compose DNS resolves 'backend' to the container's IP
    upstream backend {
        server  backend:5000;    # Target container name and port
        keepalive  32;            # Keep 32 idle connections open for reuse
    }

    # 'frontend' upstream: Static file server (Nginx serving built React/Vue app)
    # Docker Compose DNS resolves 'frontend' to the container's IP
    upstream frontend {
        server  frontend:80;      # Target container name and port
        keepalive  32;            # Keep 32 idle connections open for reuse
    }

    ### ── HTTP Server (No SSL) ────────────────────────────────
    ### Main server block handling all HTTP traffic on port 80
    
    server {
        # Listen on IPv4 port 80 
        listen  80;
        
        # Domain names this server responds to (wildcard catch-all for now)
        server_name  _;

        ### ── Security Headers ──────────────────────────────
        # These headers protect against common web vulnerabilities
        
        # Prevent this site from being embedded in <frame> or <iframe>
        # Protects against clickjacking attacks
        add_header  X-Frame-Options            "SAMEORIGIN"                           always;
        
        # Prevent MIME-type sniffing (browser won't guess content type)
        # Protects against MIME confusion attacks
        add_header  X-Content-Type-Options     "nosniff"                              always;
        
        # Enable browser's XSS filter (legacy but harmless)
        add_header  X-XSS-Protection           "1; mode=block"                        always;
        
        # Control referrer information sent to other sites
        # strict-origin-when-cross-origin = send full URL to same origin, 
        # only origin to other sites, nothing for insecure -> secure
        add_header  Referrer-Policy            "strict-origin-when-cross-origin"      always;
        
        # Content Security Policy: restrict what resources can load
        # default-src 'self' = by default only load from same origin
        # script-src allows inline scripts (needed for many SPAs)
        # style-src allows inline styles and Google Fonts
        # font-src allows data URIs and Google Fonts CDN
        # img-src allows data URIs, HTTPS images, and blob URLs
        # connect-src allows WebSocket and API calls
        add_header  Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' ws: wss: http: https:;"
            always;

        ### ── Health check ──────────────────────────────────
        # Simple endpoint for Docker/docker-compose health checks
        # Returns HTTP 200 "healthy" if nginx is running
        
        location /health {
            access_log  off;              # Don't log health checks (too noisy)
            return  200  "healthy\n";     # HTTP 200 with body "healthy"
            add_header  Content-Type  text/plain;
        }

        location /auth/ {
            # Adding the trailing slash to both the location and the proxy_pass
            # tells Nginx to replace "/auth/" with "/api/auth/" when sending to backend.
            proxy_pass http://backend/api/auth/; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        ### ── API Routes → backend (Express :5000) ──────────
        # All requests starting with /api/ go to the Express backend
        
        location /api/ {
            # Apply strict rate limiting (10r/s with burst of 20)
            # burst=20 = allow 20 requests in burst, nodelay = don't delay, just allow or reject
            limit_req  zone=api_limit  burst=20  nodelay;

            # Forward to the 'backend' upstream defined above
            proxy_pass              http://backend;
            
            # Use HTTP/1.1 for upstream (required for keepalive, WebSocket)
            proxy_http_version      1.1;
            
            # WebSocket support headers (allow real-time connections)
            proxy_set_header  Upgrade            $http_upgrade;
            proxy_set_header  Connection         'upgrade';
            
            # Pass original host header (important for virtual hosting)
            proxy_set_header  Host               $host;
            
            # Pass real client IP (backend sees actual user, not nginx IP)
            proxy_set_header  X-Real-IP          $remote_addr;
            
            # Pass proxy chain (if client is behind proxies, see all of them)
            proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
            
            # Tell backend the original protocol (http vs https)
            # Backend can check this to know if request was secure
            proxy_set_header  X-Forwarded-Proto  $scheme;
            
            # Don't use cache for WebSocket upgrade requests
            proxy_cache_bypass  $http_upgrade;
            
            # Timeouts for backend communication
            proxy_connect_timeout  60s;   # Time to establish connection
            proxy_send_timeout     60s;   # Time to send request body
            proxy_read_timeout     60s;   # Time to wait for response
        }

        ### ── Static Assets → frontend container ───────────
        # Optimized handling for static files (JS, CSS, images, fonts)
        # Regex ~* = case-insensitive match
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            # Serve from frontend container
            proxy_pass          http://frontend;
            proxy_http_version  1.1;
            proxy_set_header    Host  $host;

            # Cache headers: tell browsers to cache for 1 year
            # Safe because Vite/webpack use content-hashed filenames
            # (e.g., main.a1b2c3d.js - filename changes if content changes)
            expires             1y;
            
            # Mark as publicly cacheable and immutable (won't change)
            add_header          Cache-Control  "public, immutable";
            
            # Don't log access to static files (reduces log noise)
            access_log          off;
        }

        ### ── Frontend SPA Routes → frontend container ──────
        # All other requests go to the frontend (Single Page Application)
        # Frontend nginx handles client-side routing (React Router, Vue Router, etc.)
        
        location / {
            # Apply general rate limiting (50r/s with burst of 50)
            limit_req  zone=general_limit  burst=50  nodelay;

            # Forward to frontend container
            proxy_pass              http://frontend;
            proxy_http_version      1.1;
            
            # WebSocket support (for hot reload in dev, or real-time features)
            proxy_set_header  Upgrade            $http_upgrade;
            proxy_set_header  Connection         'upgrade';
            
            # Standard proxy headers (same as API section)
            proxy_set_header  Host               $host;
            proxy_set_header  X-Real-IP          $remote_addr;
            proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto  $scheme;
            
            proxy_cache_bypass  $http_upgrade;
        }
    }
}
