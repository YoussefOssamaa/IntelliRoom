### ============================================================
###  nginx.prod.conf  —  IntelliRoom PRODUCTION
###
###  Roles:
###    - SSL/TLS termination (certs mounted via docker-compose)
###    - Reverse proxy to the backend  (Express :5000)
###    - Reverse proxy to the frontend (Nginx static :80)
###    - Security headers, rate limiting, gzip compression
### ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    ### ── Logging ──────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    ### ── Performance ─────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size  2048;
    client_max_body_size  50M;

    ### ── Gzip Compression ────────────────────────────────────
    gzip             on;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/rss+xml application/atom+xml image/svg+xml;

    ### ── Rate Limiting ───────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m      rate=10r/s;
    limit_req_zone  $binary_remote_addr  zone=general_limit:10m  rate=50r/s;

    ### ── Upstreams ───────────────────────────────────────────
    ### backend  → dedicated backend container  (Express :5000)
    ### frontend → dedicated frontend container (Nginx static :80)

    upstream backend {
        server  backend:5000;
        keepalive  32;
    }

    upstream frontend {
        server  frontend:80;
        keepalive  32;
    }

    ### ── HTTP → HTTPS Redirect ───────────────────────────────
    ### Only exception: ACME challenge for Let's Encrypt renewal.
    server {
        listen  80;
        server_name  _;

        location /.well-known/acme-challenge/ {
            root  /var/www/certbot;
        }

        location / {
            return  301  https://$host$request_uri;
        }
    }

    ### ── HTTPS Server ────────────────────────────────────────
    server {
        listen  443 ssl http2;
        server_name  yourdomain.com www.yourdomain.com;

        ### ── SSL/TLS ────────────────────────────────────────
        ### Certs are bind-mounted from ./certs/ in docker-compose.prod.yml
        ssl_certificate      /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;

        ### ── Security Headers ──────────────────────────────
        add_header  Strict-Transport-Security  "max-age=31536000; includeSubDomains"  always;
        add_header  X-Frame-Options            "SAMEORIGIN"                           always;
        add_header  X-Content-Type-Options     "nosniff"                              always;
        add_header  X-XSS-Protection           "1; mode=block"                        always;
        add_header  Referrer-Policy            "strict-origin-when-cross-origin"      always;
        add_header  Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' ws: wss: https:;"
            always;

        ### ── Health check ──────────────────────────────────
        ### Polled by the docker-compose healthcheck on the nginx service.
        location /health {
            access_log  off;
            return  200  "healthy\n";
            add_header  Content-Type  text/plain;
        }

        ### ── API Routes → backend (Express :5000) ──────────
        ### /api/foo  is stripped to /foo before forwarding.
        location /api/ {
            limit_req  zone=api_limit  burst=20  nodelay;

            proxy_pass              http://backend;
            proxy_http_version      1.1;
            proxy_set_header  Upgrade            $http_upgrade;
            proxy_set_header  Connection         'upgrade';
            proxy_set_header  Host               $host;
            proxy_set_header  X-Real-IP          $remote_addr;
            proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto  $scheme;
            proxy_cache_bypass  $http_upgrade;
            proxy_connect_timeout  60s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }

        ### ── Static Assets → frontend container ───────────
        ### Vite/webpack outputs content-hashed filenames so
        ### 1-year immutable caching is safe.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass          http://frontend;
            proxy_http_version  1.1;
            proxy_set_header    Host  $host;

            expires             1y;
            add_header          Cache-Control  "public, immutable";
            access_log          off;
        }

        ### ── Frontend SPA Routes → frontend container ──────
        ### The frontend container's own nginx handles try_files
        ### and serves index.html for unknown client-side routes.
        location / {
            limit_req  zone=general_limit  burst=50  nodelay;

            proxy_pass              http://frontend;
            proxy_http_version      1.1;
            proxy_set_header  Upgrade            $http_upgrade;
            proxy_set_header  Connection         'upgrade';
            proxy_set_header  Host               $host;
            proxy_set_header  X-Real-IP          $remote_addr;
            proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto  $scheme;
            proxy_cache_bypass  $http_upgrade;
        }
    }
}
